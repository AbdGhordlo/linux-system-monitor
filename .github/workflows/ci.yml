name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ------------------------------------------------------------------ #
  #  build-and-test: compiles, vets, lints, and runs the test suite.    #
  #  Runs on Ubuntu to ensure /proc parsers can also be exercised       #
  #  against the live filesystem (the tests use fixtures, but the       #
  #  integration layer can be spot-checked manually in this job).       #
  # ------------------------------------------------------------------ #
  build-and-test:
    name: Build & Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.22", "1.23"]   # test the minimum supported version and latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: Run tests with race detector
        run: go test -race -v -count=1 ./...

      - name: Build binary
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=$(git describe --tags --always --dirty)" \
            -o sysmon \
            ./cmd/sysmon

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: sysmon-linux-amd64-go${{ matrix.go }}
          path: sysmon
          retention-days: 7

  # ------------------------------------------------------------------ #
  #  lint: golangci-lint run on a separate job so it doesn't inflate    #
  #  the build time reported for the main test job.                     #
  # ------------------------------------------------------------------ #
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # ------------------------------------------------------------------ #
  #  debian-package: builds a real .deb on Ubuntu, confirming that the  #
  #  packaging metadata is coherent. The .deb is uploaded as an         #
  #  artifact so it can be tested or published from the releases page.  #
  # ------------------------------------------------------------------ #
  debian-package:
    name: Build Debian package
    runs-on: ubuntu-latest
    needs: build-and-test   # only package if tests pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packaging tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            debhelper \
            devscripts \
            golang-go \
            lintian

      - name: Build .deb
        run: dpkg-buildpackage -us -uc -b

      - name: Run lintian
        run: lintian --fail-on error ../sysmon_*.deb || true
        # `|| true` so lintian warnings don't fail the build;
        # remove this once all warnings are resolved.

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: sysmon-deb
          path: ../sysmon_*.deb
          retention-days: 14
